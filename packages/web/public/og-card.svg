<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!--
    openartifact static Open Graph / Twitter card (issue-14).

    DESIGN NOTES (for the human reviewer)
    1. Static and identical for every Link. openartifact is client-side only and
       the Document lives in the URL fragment, which no server ever sees
       (ADR 0002), so per-Link previews are impossible. This card is the
       trustworthy, honest stand-in shown wherever a Link is pasted.
    2. Palette mirrors src/style.css LIGHT theme tokens: bg #ffffff, fg #1a1a1a,
       accent #2563eb, accent-hover #1d4ed8, muted rgba(0,0,0,0.55),
       border rgba(0,0,0,0.18), plus a code-tinted URL chip.
    3. Zero third-party refs: no external image href, no @font-face, no external
       font import, no url(http). Fonts are a web-safe system stack; the build
       rasterizes with the OS font set, so the committed PNG is self-contained.
    4. 1200x630 is the standard OG size (1.91:1) that Slack/iMessage/Teams want.
  -->
  <defs>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Accent rail down the left edge -->
  <rect x="0" y="0" width="14" height="630" fill="url(#accentBar)"/>

  <!-- Brand mark: a rounded "link/document" tile with the markdown ">" arrow -->
  <g transform="translate(96, 150)">
    <rect width="96" height="96" rx="20" fill="#2563eb"/>
    <!-- stylised markdown chevron + bar (the "the link IS the document" mark) -->
    <path d="M30 34 L48 48 L30 62" fill="none" stroke="#ffffff" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="54" y1="64" x2="70" y2="64" stroke="#ffffff" stroke-width="9"
          stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="216" y="222" font-size="64" font-weight="700" fill="#1a1a1a"
        letter-spacing="-1">openartifact</text>

  <!-- Tagline -->
  <text x="96" y="320" font-size="40" font-weight="600" fill="#1a1a1a">the link is the document</text>

  <!-- Honest sub-line -->
  <text x="96" y="380" font-size="26" font-weight="400" fill="rgba(0,0,0,0.55)">Share beautifully-rendered markdown as a single link.</text>
  <text x="96" y="418" font-size="26" font-weight="400" fill="rgba(0,0,0,0.55)">Client-side only — nothing is stored on a server.</text>

  <!-- Faux URL chip, reinforcing "the link is the document" -->
  <g transform="translate(96, 470)">
    <rect width="640" height="64" rx="12" fill="rgba(127,127,127,0.10)"
          stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
    <text x="24" y="41" font-size="24" font-weight="500"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          fill="rgba(0,0,0,0.55)">openartifact.md/#…your-document…</text>
  </g>
</svg>
