name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Determine release
        id: version
        run: node scripts/release.mjs

      - name: Build
        if: steps.version.outputs.published == 'true'
        run: pnpm -r build

      - name: Publish @hashdoc/core
        if: steps.version.outputs.published == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          if npm view "@hashdoc/core@${version}" version >/dev/null 2>&1; then
            echo "@hashdoc/core@${version} already published, skipping."
          else
            pnpm --filter @hashdoc/core publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @hashdoc/mcp
        if: steps.version.outputs.published == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          if npm view "@hashdoc/mcp@${version}" version >/dev/null 2>&1; then
            echo "@hashdoc/mcp@${version} already published, skipping."
          else
            pnpm --filter @hashdoc/mcp publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit, tag and push
        if: steps.version.outputs.published == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): v${version} [skip ci]"
          git rev-parse "v${version}" >/dev/null 2>&1 || git tag -a "v${version}" -m "v${version}"
          git push --atomic origin HEAD:main "refs/tags/v${version}"
